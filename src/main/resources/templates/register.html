<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | VEL TECH Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Create Account</h2>
        <form th:action="@{/register}" th:object="${user}" method="post">
            <input type="text" th:field="*{fullName}" placeholder="Full Name" required />
            <input type="email" th:field="*{email}" placeholder="Email Address" required />
            <input type="password" th:field="*{password}" placeholder="Create Password" required />
            <button type="submit">Sign Up</button>
        </form>
        <a href="/login" class="cancel-link">&larr; Back to Login</a>
    </div>
</body>
</html>
