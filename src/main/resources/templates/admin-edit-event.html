<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Event | VEL TECH Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="form-card" style="margin-top: 5rem;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">✏️ Edit Event Details</h2>
        
        <form th:action="@{/admin/update-event/{id}(id=${event.id})}" th:object="${event}" method="post" enctype="multipart/form-data">
            
            <label>Event Title</label>
            <input type="text" th:field="*{title}" required />
            
            <label>Date & Time</label>
            <input type="datetime-local" th:field="*{eventDate}" required />
            
            <label>Location</label>
            <input type="text" th:field="*{location}" required />
            
            <label>Update Event Poster (Optional)</label>
            <span class="note">Leave this blank if you want to keep the current image.</span>
            <input type="file" name="imageFile" accept="image/*" />
            
            <button type="submit" style="margin-top: 1rem;">Save Changes</button>
        </form>
        
        <a href="/admin/manage-events" class="cancel-link">Cancel and return to Admin Portal</a>
    </div>
</body>
</html>
